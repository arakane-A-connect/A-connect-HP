function calcEstimate(plan) {
    switch(plan) {
        case 'light':
            return 22000;  // Light Plan (5 hours)
        case 'standard':
            return 42900;  // Standard Plan (10 hours)
        case 'premium':
            return 83600;  // Premium Plan (20 hours)
        default:
            return 0; // Invalid plan
    }
}
